<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Memory</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <meta id="ogTitle"       property="og:title"       content="A Travel Memory">
    <meta id="ogDescription" property="og:description" content="">
    <meta id="ogImage"       property="og:image"       content="">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; font-family: 'Zen Kaku Gothic New', sans-serif; overflow: hidden; height: 100vh; }

        #map { width: 100vw; height: 100vh; }

        /* Dark map overlay at start */
        #mapOverlay {
            position: fixed; inset: 0;
            background: #0a0a0f;
            z-index: 500;
            opacity: 1;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }
        #mapOverlay.fade { opacity: 0; }

        /* Loading */
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Sawarabi Mincho', serif;
            font-size: 1.2rem; color: white; opacity: 0.4;
            background: #0a0a0f; z-index: 600;
        }

        /* Not found */
        #notFound {
            display: none; position: fixed; inset: 0;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
            background: #0a0a0f; z-index: 600; color: white;
        }
        #notFound h2 { font-family: 'Sawarabi Mincho', serif; opacity: 0.6; }
        #notFound a  { color: #f2a7c3; font-size: 0.9rem; }

        /* Back button */
        .mem-back {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.15);
            border: none; color: white;
            padding: 8px 16px; border-radius: 20px;
            font-size: 0.82rem; cursor: pointer;
            backdrop-filter: blur(8px);
            text-decoration: none;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            transition: background 0.2s; z-index: 1000;
        }
        .mem-back:hover { background: rgba(255,255,255,0.28); }

        /* Custom popup */
        .mem-popup {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            min-width: 240px; max-width: 300px;
        }
        .mem-popup img {
            width: 100%; border-radius: 8px;
            margin-bottom: 10px; max-height: 160px;
            object-fit: cover; display: block;
        }
        .mem-popup .pop-location {
            font-family: 'Sawarabi Mincho', serif;
            font-size: 1.1rem; color: #2c2c54;
            margin-bottom: 4px;
        }
        .mem-popup .pop-date {
            font-size: 0.75rem; color: #999;
            margin-bottom: 10px; letter-spacing: 0.04em;
        }
        .mem-popup .pop-special {
            font-style: italic; font-size: 0.88rem;
            color: #555; line-height: 1.6;
            border-left: 3px solid #f2a7c3;
            padding-left: 10px;
        }
        .mem-popup .pop-story {
            font-size: 0.88rem; color: #444;
            line-height: 1.6; margin-bottom: 8px;
        }
        .mem-popup .pop-cta {
            display: inline-block; margin-top: 12px;
            background: linear-gradient(135deg, #f2a7c3, #e87fa8);
            color: white; padding: 6px 14px;
            border-radius: 20px; font-size: 0.78rem;
            text-decoration: none;
        }

        /* Pulsing marker ring */
        .pulse-ring {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: rgba(242,167,195,0.4);
            border: 2px solid #f2a7c3;
            animation: pulse 1.5s ease-out infinite;
        }
        @keyframes pulse {
            0%   { transform: scale(1);   opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Leaflet popup tweaks */
        .leaflet-popup-content-wrapper {
            border-radius: 14px !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2) !important;
        }
        .leaflet-popup-tip { display: none; }
    </style>
</head>
<body>

    <div id="loading">Loading memory...</div>
    <div id="notFound">
        <h2>Memory not found</h2>
        <a href="/">← Travel Blog</a>
    </div>

    <div id="mapOverlay"></div>
    <div id="map"></div>
    <a href="/" class="mem-back">← Travel Blog</a>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
    async function init() {
        const id  = window.location.pathname.split('/').pop();
        const res = await fetch(`/api/memory/${id}`);

        document.getElementById('loading').style.display = 'none';

        if (!res.ok) {
            document.getElementById('notFound').style.display = 'flex';
            return;
        }

        const m = await res.json();

        // Meta tags for link previews
        document.title = `${m.location_name} — Travel Memory`;
        document.getElementById('ogTitle').content       = m.location_name;
        document.getElementById('ogDescription').content = m.why_was_it_special || m.what_happened || '';
        if (m.photo_url) document.getElementById('ogImage').content = m.photo_url;

        // Init map on world view
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([20, 0], 2);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Fade map in
        setTimeout(() => {
            document.getElementById('mapOverlay').classList.add('fade');
        }, 300);

        // Fly to location after fade
        setTimeout(() => {
            map.flyTo([m.lat, m.lng], 13, { duration: 3.5, easeLinearity: 0.25 });
        }, 800);

        // Drop pulsing marker and open popup after fly
        setTimeout(() => {
            // Pulse ring icon
            const pulseIcon = L.divIcon({
                className: '',
                html: '<div class="pulse-ring"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            const marker = L.marker([m.lat, m.lng], { icon: pulseIcon }).addTo(map);

            // Build popup content
            const photoHtml = m.photo_url
                ? `<img src="${m.photo_url}" alt="${m.location_name}">`
                : '';

            const popupHtml = `
                <div class="mem-popup">
                    ${photoHtml}
                    <div class="pop-location">${m.location_name}</div>
                    <div class="pop-date">${new Date(m.date_visited).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })}</div>
                    ${m.what_happened ? `<div class="pop-story">${m.what_happened}</div>` : ''}
                    ${m.why_was_it_special ? `<div class="pop-special">"${m.why_was_it_special}"</div>` : ''}
                    <a href="/" class="pop-cta">Start your own journal ✦</a>
                </div>
            `;

            marker.bindPopup(popupHtml, {
                maxWidth: 300,
                closeButton: false,
                offset: [0, -10]
            }).openPopup();

        }, 4800);
    }

    init();
    </script>
</body>
</html>
