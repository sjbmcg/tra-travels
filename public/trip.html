<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0f; font-family:'Zen Kaku Gothic New',sans-serif; overflow:hidden; height:100vh; }

        #map { width:100vw; height:100vh; }

        #mapOverlay {
            position:fixed; inset:0;
            background:#0a0a0f; z-index:500;
            opacity:1; transition:opacity 1.2s ease;
            pointer-events:none;
        }
        #mapOverlay.fade { opacity:0; }

        #loading {
            position:fixed; inset:0;
            display:flex; align-items:center; justify-content:center;
            font-family:'Sawarabi Mincho',serif;
            font-size:1.2rem; color:white; opacity:0.4;
            background:#0a0a0f; z-index:600;
        }

        #notFound {
            display:none; position:fixed; inset:0;
            align-items:center; justify-content:center;
            flex-direction:column; gap:16px;
            background:#0a0a0f; z-index:600; color:white;
        }
        #notFound h2 { font-family:'Sawarabi Mincho',serif; opacity:0.6; }
        #notFound a  { color:#f2a7c3; font-size:0.9rem; }

        /* Back button */
        .mem-back {
            position:fixed; top:20px; left:20px;
            background:rgba(255,255,255,0.15);
            border:none; color:white;
            padding:8px 16px; border-radius:20px;
            font-size:0.82rem; cursor:pointer;
            backdrop-filter:blur(8px);
            text-decoration:none;
            font-family:'Zen Kaku Gothic New',sans-serif;
            transition:background 0.2s; z-index:1000;
        }
        .mem-back:hover { background:rgba(255,255,255,0.28); }

        /* Progress bar */
        #progress {
            position:fixed; bottom:28px; left:50%;
            transform:translateX(-50%);
            display:flex; gap:8px; z-index:1000;
            opacity:0; transition:opacity 0.5s;
        }
        #progress.visible { opacity:1; }
        .prog-dot {
            width:8px; height:8px; border-radius:50%;
            background:rgba(255,255,255,0.3);
            transition:background 0.4s, transform 0.4s;
        }
        .prog-dot.active {
            background:#f2a7c3;
            transform:scale(1.4);
        }
        .prog-dot.done { background:rgba(242,167,195,0.5); }

        /* Stop counter */
        #stopLabel {
            position:fixed; top:20px; right:20px;
            background:rgba(0,0,0,0.4);
            color:rgba(255,255,255,0.7);
            padding:6px 14px; border-radius:20px;
            font-size:0.78rem; z-index:1000;
            backdrop-filter:blur(8px);
            opacity:0; transition:opacity 0.5s;
        }
        #stopLabel.visible { opacity:1; }

        /* Custom popup */
        .mem-popup { font-family:'Zen Kaku Gothic New',sans-serif; min-width:240px; max-width:300px; }
        .mem-popup img { width:100%; border-radius:8px; margin-bottom:10px; max-height:160px; object-fit:cover; display:block; }
        .pop-location { font-family:'Sawarabi Mincho',serif; font-size:1.1rem; color:#2c2c54; margin-bottom:4px; }
        .pop-date     { font-size:0.75rem; color:#999; margin-bottom:10px; letter-spacing:0.04em; }
        .pop-story    { font-size:0.88rem; color:#444; line-height:1.6; margin-bottom:8px; }
        .pop-special  { font-style:italic; font-size:0.88rem; color:#555; line-height:1.6; border-left:3px solid #f2a7c3; padding-left:10px; }
        .pop-cta      { display:inline-block; margin-top:12px; background:linear-gradient(135deg,#f2a7c3,#e87fa8); color:white; padding:6px 14px; border-radius:20px; font-size:0.78rem; text-decoration:none; }

        /* Pulse */
        .pulse-ring { width:20px; height:20px; border-radius:50%; background:rgba(242,167,195,0.4); border:2px solid #f2a7c3; animation:pulse 1.5s ease-out infinite; }
        @keyframes pulse { 0%{transform:scale(1);opacity:1} 100%{transform:scale(2.5);opacity:0} }

        .leaflet-popup-content-wrapper { border-radius:14px !important; box-shadow:0 8px 32px rgba(0,0,0,0.2) !important; }
        .leaflet-popup-tip { display:none; }
        #map { background: #0a0a0f; }
        #map.leaflet-container { background: #0a0a0f; }
    </style>
</head>
<body>

    <div id="loading">Loading trip...</div>
    <div id="notFound">
        <h2>Trip not found</h2>
        <a href="/">← Travel Blog</a>
    </div>

    <div id="mapOverlay"></div>
    <div id="map"></div>
    <a href="/" class="mem-back">← Travel Blog</a>
    <div id="progress"></div>
    <div id="stopLabel"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.min.js"></script>
    <script>
    let map;
    let memories = [];
    let currentStop = 0;
    let routeCoords = [];
    let polyline = null;
    let decorator = null;

    async function init() {
        const id  = window.location.pathname.split('/').pop();
        const res = await fetch(`/api/trip/${id}`);

        document.getElementById('loading').style.display = 'none';

        if (!res.ok) { document.getElementById('notFound').style.display = 'flex'; return; }

        memories = await res.json();
        if (memories.length < 3) { document.getElementById('notFound').style.display = 'flex'; return; }

        document.title = `Trip — ${memories[0].location_name} & more`;

        // Build progress dots
        const progress = document.getElementById('progress');
        memories.forEach((_, i) => {
            const dot = document.createElement('span');
            dot.className = 'prog-dot';
            dot.id = `dot-${i}`;
            progress.appendChild(dot);
        });

        // Init dark map
        map = L.map('map', { zoomControl:false, attributionControl:false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:19, keepBuffer:6 }).addTo(map);

        // Fit to all locations first
        const bounds = L.latLngBounds(memories.map(m => [m.lat, m.lng]));
        map.fitBounds(bounds, { padding:[80,80] });

        // Fade in map
        setTimeout(() => document.getElementById('mapOverlay').classList.add('fade'), 300);

        // Show progress and label
        setTimeout(() => {
            document.getElementById('progress').classList.add('visible');
            document.getElementById('stopLabel').classList.add('visible');
        }, 1200);

        // Start tour after overview
        setTimeout(() => flyToStop(0), 2500);
    }

    function flyToStop(index) {
        if (index >= memories.length) return;

        const m = memories[index];
        currentStop = index;

        // Update progress dots
        memories.forEach((_, i) => {
            const dot = document.getElementById(`dot-${i}`);
            dot.className = 'prog-dot' + (i === index ? ' active' : i < index ? ' done' : '');
        });

        // Update stop label
        document.getElementById('stopLabel').textContent = `Stop ${index + 1} of ${memories.length}`;

        // Fly to location
        map.flyTo([m.lat, m.lng], 13, { duration: 2.5, easeLinearity: 0.25 });

        // Drop marker and open popup after fly
        setTimeout(() => {
            const pulseIcon = L.divIcon({
                className:'', html:'<div class="pulse-ring"></div>',
                iconSize:[20,20], iconAnchor:[10,10]
            });

            const marker = L.marker([m.lat, m.lng], { icon:pulseIcon }).addTo(map);

            const photoHtml = m.photo_url ? `<img src="${m.photo_url}" alt="${m.location_name}">` : '';
            const isLast = index === memories.length - 1;

            marker.bindPopup(`
                <div class="mem-popup">
                    ${photoHtml}
                    <div class="pop-location">${m.location_name}</div>
                    <div class="pop-date">${new Date(m.date_visited).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
                    ${m.what_happened ? `<div class="pop-story">${m.what_happened}</div>` : ''}
                    ${m.why_was_it_special ? `<div class="pop-special">"${m.why_was_it_special}"</div>` : ''}
                    ${isLast ? `<a href="/" class="pop-cta">Start your own journal ✦</a>` : ''}
                </div>
            `, { maxWidth:300, closeButton:false, offset:[0,-10] }).openPopup();

            // Draw route line to this stop
            routeCoords.push([m.lat, m.lng]);
            if (routeCoords.length > 1) drawRoute();

            // Move to next stop after delay
            if (!isLast) {
                setTimeout(() => {
                    map.closePopup();
                    const overlay = document.getElementById('mapOverlay');
                    overlay.style.transition = 'opacity 0.3s ease';
                    overlay.style.opacity = '0.7';
                    setTimeout(() => {
                        flyToStop(index + 1);
                        setTimeout(() => {
                            overlay.style.transition = 'opacity 2s ease';
                            overlay.style.opacity = '0';
                        }, 600);
                    }, 400);
                }, 5000);
            }

        }, 2800);
    }

    function drawRoute() {
        if (polyline)  { map.removeLayer(polyline);  }
        if (decorator) { map.removeLayer(decorator); }

        polyline = L.polyline(routeCoords, { color:'#f2a7c3', weight:3, opacity:0.7, dashArray:'6,8' }).addTo(map);

        decorator = L.polylineDecorator(polyline, {
            patterns:[{
                offset:'5%', repeat:'15%',
                symbol: L.Symbol.arrowHead({
                    pixelSize:12, polygon:false,
                    pathOptions:{ color:'#e87fa8', weight:2.5, opacity:0.9 }
                })
            }]
        }).addTo(map);
    }

    init();
    </script>
</body>
</html>
